name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: npm-audit-results
          path: npm-audit.json

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for org repos.
      # Use the OSS CLI directly with our repo's .gitleaks.toml allowlist.
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (PR diff only)
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        # Only scan commits introduced by this PR/push, not the full repo history.
        # The repo has pre-existing secrets in legacy docs (Netlify tokens, JWTs, etc.)
        # that are out of scope for any single PR.
        run: |
          # Pull request: scan commits unique to the PR.
          # Push: scan commits introduced by the push (github.event.before..HEAD).
          # Schedule: scan working tree only (full-history scan would re-flag
          # all pre-existing legacy secrets every Sunday).
          if [ -n "$GITHUB_BASE_REF" ]; then
            git fetch origin "$GITHUB_BASE_REF" --depth=50
            RANGE="origin/${GITHUB_BASE_REF}..HEAD"
          elif [ -n "$GITHUB_EVENT_BEFORE" ] && [ "$GITHUB_EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${GITHUB_EVENT_BEFORE}..${GITHUB_SHA}"
          else
            RANGE=""   # falls through to --no-git below
          fi
          echo "Scan range: $RANGE"
          if [ -z "$RANGE" ]; then
            gitleaks detect --source=. --config=.gitleaks.toml --no-git --redact --verbose --no-banner
          else
            gitleaks detect --source=. --config=.gitleaks.toml --log-opts="$RANGE" --redact --verbose --no-banner
          fi

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript,typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
