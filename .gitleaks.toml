# Extends the default gitleaks ruleset.
# Supabase publishable/anon keys are designed to be embedded in client code;
# they are not secrets. Keep the scanner from flagging .env.example placeholders
# and any past commits that briefly held them.
[extend]
useDefault = true

[allowlist]
description = "Public-by-design Supabase keys and example env templates"
paths = [
  '''\.env\.example$''',
  '''\.env\.example\.[a-z]+$''',
  '''\.gitleaks\.toml$''',
]
regexes = [
  '''sb_publishable_[A-Za-z0-9_-]+''',
  # Supabase anon/publishable JWT for project ref qdwvcrmdqweojverdmmz.
  # Match without storing the literal JWT prefix to avoid recursive detection.
  '''[A-Za-z0-9]+\.[A-Za-z0-9]*qdwvcrmdqweojverdmmz[A-Za-z0-9._-]*''',
]
